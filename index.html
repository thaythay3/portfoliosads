<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HamburgueriaZ - App</title>
    <!-- Conecta com o seu arquivo style.css -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Etapa 4: Logo -->
    <div class="logo-container">
        <img src="https://via.placeholder.com/600x300/496d89/ffff00?text=HamburgueriaZ" alt="Logo HamburgueriaZ">
    </div>

    <!-- Etapa 3: Estilo de Texto Padronizado -->
    <label class="estilo-texto">Faça seu pedido</label>
    <input type="text" id="nomeCliente" placeholder="Digite seu nome">

    <div class="checkbox-group">
        <div class="checkbox-item">
            <input type="checkbox" id="cbBacon"> <label for="cbBacon">Bacon (R$ 2,00 )</label>
        </div>
        <div class="checkbox-item">
            <input type="checkbox" id="cbQueijo"> <label for="cbQueijo">Queijo (R$ 2,00)</label>
        </div>
        <div class="checkbox-item">
            <input type="checkbox" id="cbOnion"> <label for="cbOnion">Onion Rings (R$ 3,00)</label>
        </div>
    </div>

    <label class="estilo-texto">Quantidade</label>
    <div class="quantidade-container">
        <button class="btn-qtd" onclick="subtrair()">-</button>
        <span id="txtQuantidade">1</span>
        <button class="btn-qtd" onclick="somar()">+</button>
    </div>

    <!-- Etapa 6: Botão Enviar -->
    <button class="btn-enviar" onclick="enviarPedido()">Enviar Pedido</button>

    <label class="estilo-texto">Resumo do pedido</label>
    <div id="resumoPedido" class="resumo-box">
        Preço final: R$ 0,00
    </div>

    <script>
        let quantidade = 1;
        const precoBase = 20;

        function somar() {
            quantidade++;
            document.getElementById('txtQuantidade').innerText = quantidade;
        }

        function subtrair() {
            if (quantidade > 1) {
                quantidade--;
                document.getElementById('txtQuantidade').innerText = quantidade;
            }
        }

        function enviarPedido() {
            const nome = document.getElementById('nomeCliente').value;
            const temBacon = document.getElementById('cbBacon').checked;
            const temQueijo = document.getElementById('cbQueijo').checked;
            const temOnion = document.getElementById('cbOnion').checked;

            let precoUnitario = precoBase;
            if (temBacon) precoUnitario += 2;
            if (temQueijo) precoUnitario += 2;
            if (temOnion) precoUnitario += 3;
            
            const precoTotal = precoUnitario * quantidade;

            const resumoTexto = `Nome do cliente: ${nome || 'Cliente'}\n` +
                                `Tem Bacon? ${temBacon ? 'Sim' : 'Não'}\n` +
                                `Tem Queijo? ${temQueijo ? 'Sim' : 'Não'}\n` +
                                `Tem Onion Rings? ${temOnion ? 'Sim' : 'Não'}\n` +
                                `Quantidade: ${quantidade}\n` +
                                `Preço final: R$ ${precoTotal.toFixed(2)}`;

            document.getElementById('resumoPedido').innerText = resumoTexto;

            // Simula o Intent de E-mail
            const assunto = encodeURIComponent(`Pedido de ${nome || 'Cliente'}`);
            const corpo = encodeURIComponent(resumoTexto);
            window.location.href = `mailto:?subject=${assunto}&body=${corpo}`;
        }
    </script>
</body>
</html>
