<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>HamburgueriaZ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>Faça seu pedido</h1>

    <input type="text" id="nome" placeholder="Seu nome">

    <div class="opcoes">
        <label><input type="checkbox" id="bacon"> Bacon (+R$2)</label>
        <label><input type="checkbox" id="queijo"> Queijo (+R$2)</label>
        <label><input type="checkbox" id="onion"> Onion Rings (+R$3)</label>
    </div>

    <div class="quantidade">
        <button onclick="subtrair()">-</button>
        <span id="qtd">1</span>
        <button onclick="somar()">+</button>
    </div>

    <button class="btn" onclick="enviarPedido()">Enviar Pedido</button>

    <pre id="resultado"></pre>
</div>

<script>
let quantidade = 1;

function somar(){
    quantidade++;
    atualizar();
}

function subtrair(){
    if(quantidade > 1){
        quantidade--;
    }
    atualizar();
}

function atualizar(){
    document.getElementById("qtd").innerText = quantidade;
}

function enviarPedido(){
    let nome = document.getElementById("nome").value;
    let bacon = document.getElementById("bacon").checked;
    let queijo = document.getElementById("queijo").checked;
    let onion = document.getElementById("onion").checked;

    let preco = 20;
    if(bacon) preco += 2;
    if(queijo) preco += 2;
    if(onion) preco += 3;

    preco *= quantidade;

    let resumo =
`Nome: ${nome}
Bacon: ${bacon ? "Sim" : "Não"}
Queijo: ${queijo ? "Sim" : "Não"}
Onion Rings: ${onion ? "Sim" : "Não"}
Quantidade: ${quantidade}
Preço: R$ ${preco}`;

    document.getElementById("resultado").innerText = resumo;
}
</script>

</body>
</html>
