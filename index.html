<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>HamburgueriaZ</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>Faça seu pedido</h1>

    <input type="text" id="nome" placeholder="Seu nome">

    <div class="opcoes">
        <label><input type="checkbox" id="bacon" onchange="atualizarPreco()"> Bacon (+R$2)</label>
        <label><input type="checkbox" id="queijo" onchange="atualizarPreco()"> Queijo (+R$2)</label>
        <label><input type="checkbox" id="onion" onchange="atualizarPreco()"> Onion Rings (+R$3)</label>
    </div>

    <div class="quantidade">
        <button onclick="subtrair()">-</button>
        <span id="qtd">1</span>
        <button onclick="somar()">+</button>
    </div>

    <h3 id="total">Total: R$ 20</h3>

    <button class="btn" onclick="enviarPedido()">Enviar Pedido</button>

    <pre id="resumo"></pre>
</div>

<script>
let quantidade = 1;

function somar(){
    quantidade++;
    atualizarQtd();
    atualizarPreco();
}

function subtrair(){
    if(quantidade > 1){
        quantidade--;
    }
    atualizarQtd();
    atualizarPreco();
}

function atualizarQtd(){
    document.getElementById("qtd").innerText = quantidade;
}

function calcularPreco(){
    let bacon = document.getElementById("bacon").checked;
    let queijo = document.getElementById("queijo").checked;
    let onion = document.getElementById("onion").checked;

    let preco = 20;

    if(bacon) preco += 2;
    if(queijo) preco += 2;
    if(onion) preco += 3;

    return preco * quantidade;
}

function atualizarPreco(){
    let total = calcularPreco();
    document.getElementById("total").innerText = "Total: R$ " + total;
}

function enviarPedido(){
    let nome = document.getElementById("nome").value;

    let bacon = document.getElementById("bacon").checked;
    let queijo = document.getElementById("queijo").checked;
    let onion = document.getElementById("onion").checked;

    let precoFinal = calcularPreco();

    let resumo =
`Nome: ${nome}
Bacon: ${bacon ? "Sim" : "Não"}
Queijo: ${queijo ? "Sim" : "Não"}
Onion Rings: ${onion ? "Sim" : "Não"}
Quantidade: ${quantidade}
Preço final: R$ ${precoFinal}`;

    document.getElementById("resumo").innerText = resumo;
}
</script>

</body>
</html>
